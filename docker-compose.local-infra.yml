version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: blitz-postgres
    restart: unless-stopped
    env_file:
      - ./app/.env
    ports:
      - "5432:5432"
    volumes:
      - blitz_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blitzpgusr -d blitzpgdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-bullseye
    container_name: blitz-redis
    restart: unless-stopped
    env_file:
      - ./app/.env
    ports:
      - "6379:6379"
    volumes:
      - blitz_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: blitz-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - ./app/.env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - blitz_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: blitz-prometheus
    restart: unless-stopped
    env_file:
      - ./app/.env
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - blitz_prometheus_data:/prometheus

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: blitz-grafana
    restart: unless-stopped
    env_file:
      - ./app/.env
    ports:
      - "3001:3000"
    volumes:
      - blitz_grafana_data:/var/lib/grafana

volumes:
  blitz_pg_data:
  blitz_redis_data:
  blitz_minio_data:
  blitz_prometheus_data:
  blitz_grafana_data: