definitions:
  handler.HealthResponse:
    properties:
      db:
        type: string
      status:
        type: string
    type: object
  model.ActiveDriversStatsResponse:
    properties:
      active_count:
        type: integer
    type: object
  model.ActivityAction:
    enum:
    - went_online
    - went_offline
    type: string
    x-enum-varnames:
    - ActionWentOnline
    - ActionWentOffline
  model.ActivityLogResponse:
    properties:
      action:
        $ref: '#/definitions/model.ActivityAction'
      driver_id:
        type: string
      id:
        type: string
      notes:
        type: string
      timestamp:
        type: string
    type: object
  model.CreateDriverRequest:
    properties:
      car_model:
        type: string
      car_plate:
        type: string
      full_name:
        type: string
      license_number:
        type: string
      phone:
        type: string
      status:
        $ref: '#/definitions/model.DriverStatus'
    type: object
  model.DriverErrorResponse:
    properties:
      error:
        $ref: '#/definitions/model.ErrorDetail'
    type: object
  model.DriverResponse:
    properties:
      car_model:
        type: string
      car_plate:
        type: string
      created_at:
        type: string
      full_name:
        type: string
      id:
        type: string
      license_number:
        type: string
      phone:
        type: string
      status:
        $ref: '#/definitions/model.DriverStatus'
      updated_at:
        type: string
    type: object
  model.DriverStatus:
    enum:
    - active
    - inactive
    - blocked
    type: string
    x-enum-varnames:
    - StatusActive
    - StatusInactive
    - StatusBlocked
  model.ErrorDetail:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  model.ErrorResponse:
    properties:
      message:
        example: error message
        type: string
    type: object
  model.GoogleAuthRequest:
    properties:
      app_type:
        type: string
      id_token:
        type: string
    type: object
  model.ListDriversResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/model.DriverResponse'
        type: array
      meta:
        $ref: '#/definitions/model.PaginationMeta'
    type: object
  model.LogActivityRequest:
    properties:
      action:
        $ref: '#/definitions/model.ActivityAction'
      notes:
        type: string
    type: object
  model.LoginRequest:
    properties:
      password:
        example: password123
        type: string
      phoneNumber:
        example: "1234567890"
        type: string
    type: object
  model.LoginResponse:
    properties:
      accessToken:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      refreshToken:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      user:
        $ref: '#/definitions/model.UserResponse'
    type: object
  model.PaginationMeta:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  model.RefreshResponse:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
    type: object
  model.RegisterRequest:
    properties:
      fullName:
        type: string
      password:
        type: string
      phoneNumber:
        type: string
    type: object
  model.UpdateDriverRequest:
    properties:
      car_model:
        type: string
      car_plate:
        type: string
      full_name:
        type: string
      license_number:
        type: string
      phone:
        type: string
    type: object
  model.UpdateStatusRequest:
    properties:
      status:
        $ref: '#/definitions/model.DriverStatus'
    type: object
  model.UserResponse:
    properties:
      email:
        type: string
      fullName:
        type: string
      gender:
        type: string
      id:
        type: string
      photo:
        type: string
      role:
        type: string
      status:
        type: string
    type: object
  model.WorkingHoursResponse:
    properties:
      driver_id:
        type: string
      period_end:
        type: string
      period_start:
        type: string
      total_hours:
        type: number
    type: object
info:
  contact: {}
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return access token
      parameters:
      - description: Login credentials
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: User login
      tags:
      - auth
  /api/v1/auth/login/with-google:
    post:
      consumes:
      - application/json
      description: Register a new user using Google and return token with user data
      parameters:
      - description: Google auth request
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/model.GoogleAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: User registration with Google
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh access token using refresh token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.RefreshResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Token refresh
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user and return token with user data
      parameters:
      - description: Registration data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/model.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: User registration
      tags:
      - auth
  /api/v1/drivers:
    get:
      description: Get a paginated list of drivers with optional filters
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Filter by status (active, inactive, blocked)
        in: query
        name: status
        type: string
      - description: Search by name or phone
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.ListDriversResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
      security:
      - BearerAuth: []
      summary: List all drivers
      tags:
      - drivers
    post:
      consumes:
      - application/json
      description: Create a new driver with the provided information
      parameters:
      - description: Driver information
        in: body
        name: driver
        required: true
        schema:
          $ref: '#/definitions/model.CreateDriverRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.DriverResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new driver
      tags:
      - drivers
  /api/v1/drivers/{id}:
    delete:
      description: Soft delete a driver (marks as deleted but retains data)
      parameters:
      - description: Driver ID (UUID)
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete driver
      tags:
      - drivers
    get:
      description: Get detailed information about a specific driver
      parameters:
      - description: Driver ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.DriverResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
      security:
      - BearerAuth: []
      summary: Get driver by ID
      tags:
      - drivers
    patch:
      consumes:
      - application/json
      description: Partially update driver information
      parameters:
      - description: Driver ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: driver
        required: true
        schema:
          $ref: '#/definitions/model.UpdateDriverRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.DriverResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
      security:
      - BearerAuth: []
      summary: Update driver information
      tags:
      - drivers
  /api/v1/drivers/{id}/activity:
    get:
      description: Get paginated history of driver online/offline activities
      parameters:
      - description: Driver ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.ActivityLogResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
      security:
      - BearerAuth: []
      summary: Get driver activity log
      tags:
      - driver-activity
    post:
      consumes:
      - application/json
      description: Log when a driver goes online or offline
      parameters:
      - description: Driver ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Activity information
        in: body
        name: activity
        required: true
        schema:
          $ref: '#/definitions/model.LogActivityRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.ActivityLogResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
      security:
      - BearerAuth: []
      summary: Log driver activity
      tags:
      - driver-activity
  /api/v1/drivers/{id}/status:
    patch:
      consumes:
      - application/json
      description: Change driver status (active, inactive, blocked)
      parameters:
      - description: Driver ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: New status
        in: body
        name: status
        required: true
        schema:
          $ref: '#/definitions/model.UpdateStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.DriverResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
      security:
      - BearerAuth: []
      summary: Update driver status
      tags:
      - drivers
  /api/v1/drivers/{id}/working-hours:
    get:
      description: Calculate total working hours for a driver within a date range
      parameters:
      - description: Driver ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Start date (YYYY-MM-DD)
        in: query
        name: start_date
        required: true
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: end_date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WorkingHoursResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
      security:
      - BearerAuth: []
      summary: Get driver working hours
      tags:
      - driver-activity
  /api/v1/drivers/stats/active:
    get:
      description: Get count of currently active drivers
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.ActiveDriversStatsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.DriverErrorResponse'
      security:
      - BearerAuth: []
      summary: Get active drivers statistics
      tags:
      - driver-activity
  /healthz:
    get:
      description: Check service health and database connectivity
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handler.HealthResponse'
      summary: Health check
      tags:
      - system
swagger: "2.0"
