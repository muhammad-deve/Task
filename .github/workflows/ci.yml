name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

permissions:
  contents: read
  packages: write

env:
  GO_VERSION: "1.24.1"
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: app/go.sum

      - name: Test
        run: make test

      - name: Lint
        run: make lint

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: image
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'staging')
    steps:
      - name: Set deployment variables
        id: deploy
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "image_tag=latest" >> "$GITHUB_OUTPUT"
            echo "service_name=blitz_back" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=staging" >> "$GITHUB_OUTPUT"
            echo "service_name=blitz_back_staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin
            docker pull ${{ env.IMAGE_NAME }}:${{ steps.deploy.outputs.image_tag }}
            docker service update --image ${{ env.IMAGE_NAME }}:${{ steps.deploy.outputs.image_tag }} --force ${{ steps.deploy.outputs.service_name }}
            docker container prune -f --filter 'until=24h' || true
            docker image prune -f --filter 'until=24h' || true
