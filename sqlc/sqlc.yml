version: "2"
sql:
  - engine: "postgresql"
    queries: "./queries"
    schema: "../app/migrations"
    gen:
      go:
        emit_json_tags: true
        emit_pointers_for_null_types: true
        package: "pg"
        out: "../app/internal/repository/pg"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"